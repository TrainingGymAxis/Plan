<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserve</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root {
            --primary-orange: #f57c00; 
            --header-yellow: #ffb300; 
            --accent-green: #4caf50;  
            --bg-color: #fafafa;     
            --text-black: #000000;    
            --box-border: #ffd54f;   
            --ryuken-color: #e53935; 
            --zendo-color: #1e88e5;  
            --bushin-color: #43a047; 
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--text-black);
            line-height: 1.6;
        }

        .site-header {
            background-color: var(--header-yellow);
            padding: 15px;
            text-align: center;
            border-bottom: 4px solid var(--primary-orange);
        }

        .container {
            max-width: 500px;
            margin: 15px auto;
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            border: 2px solid var(--box-border);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 50px;
        }

        h2 {
            text-align: center;
            color: var(--primary-orange);
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }

        h2::after {
            content: '';
            display: block;
            width: 40px;
            height: 4px;
            background: var(--accent-green);
            margin: 8px auto 0;
            border-radius: 2px;
        }

        .description {
            font-size: 0.9rem;
            margin-bottom: 20px;
            color: var(--text-black);
            text-align: center;
            font-weight: bold;
        }

        /* 教育理念の簡易表示 */
        .concept-summary {
            background: #fffdf0;
            border: 1px solid var(--box-border);
            padding: 10px;
            border-radius: 10px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group { margin-bottom: 18px; }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 0.95rem;
            color: var(--text-black);
        }

        /* バー（セレクトボックス）のデザイン */
        input[type="text"], input[type="number"], input[type="tel"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            color: var(--text-black);
            background-color: #fff;
            -webkit-appearance: none;
            appearance: none;
        }

        .select-wrapper {
            position: relative;
        }
        .select-wrapper::after {
            content: '▼';
            font-size: 0.7rem;
            color: #999;
            position: absolute;
            right: 15px;
            top: 15px;
            pointer-events: none;
        }

        .day-label {
            display: block;
            font-size: 1.15rem;
            color: var(--primary-orange);
            margin-bottom: 10px;
            font-weight: bold;
            border-top: 1px solid #eee;
            padding-top: 15px;
            margin-top: 20px;
        }
        .day-label.is-disabled { color: #ccc; }

        .class-option {
            position: relative;
            margin-bottom: 10px;
            display: block;
        }
        .class-option input[type="radio"] { display: none; }
        
        .class-card {
            display: block;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 10px;
            cursor: pointer;
            background-color: #fff;
        }

        .class-option input[type="radio"]:checked + .class-card {
            border-color: var(--primary-orange);
            background-color: #fff8f1;
        }

        /* グレーアウト（無効）スタイル */
        .class-option input[type="radio"]:disabled + .class-card {
            background-color: #f5f5f5;
            border-color: #e0e0e0;
            color: #aaa;
            cursor: not-allowed;
            pointer-events: none;
        }
        .class-option input[type="radio"]:disabled + .class-card .style-badge {
            background-color: #ccc !important;
        }

        .class-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .class-name { font-weight: bold; font-size: 0.95rem; }
        
        .style-badge {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 4px;
            color: #fff;
            font-weight: bold;
        }
        .badge-ryuken { background-color: var(--ryuken-color); }
        .badge-zendo { background-color: var(--zendo-color); }
        .badge-bushin { background-color: var(--bushin-color); }
        .class-time { font-size: 0.85rem; color: #555; }

        .note {
            font-size: 0.8rem;
            background: #fffdf0;
            padding: 12px;
            border: 1px dashed var(--primary-orange);
            margin-top: 20px;
            border-radius: 8px;
            color: var(--text-black);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background-color: var(--primary-orange);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 0 #bf6500;
        }

        #customModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 9999; align-items: center; justify-content: center;
        }
        .modal-content { background: #fff; padding: 25px; border-radius: 15px; width: 80%; max-width: 300px; text-align: center; }
        .modal-btn { background: var(--primary-orange); color: #fff; border: none; padding: 10px 40px; border-radius: 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="site-header">
    <span style="color: #000; font-weight: bold;">浜松スポーツ少年団 こども空手教室</span>
</div>

<div class="container">
    <div class="concept-summary">
        「心・技・体」
    </div>

    <h2>体験＆見学のご予約</h2>
    <p class="description">必要事項をご入力ください</p>

    <form id="reservationForm">
        <div class="form-group">
            <label for="childName">お子さんの氏名</label>
            <input type="text" id="childName" required>
        </div>

        <div class="form-group">
            <label for="childAge">お子さんの年齢</label>
            <input type="number" id="childAge" min="3" max="15" required>
        </div>

        <div class="form-group">
            <label for="visitDate">体験＆見学のご希望日</label>
            <div class="select-wrapper">
                <select id="visitDate" required onchange="syncDayAndClasses()">
                    <option value="">日付を選択してください</option>
                    </select>
            </div>
        </div>

        <div class="form-group">
            <label for="tel">ご連絡先 (電話番号)</label>
            <input type="tel" id="tel" required>
        </div>

        <div class="form-group">
            <label>体験希望の教室・時間を選んでください</label>

            <span class="day-label" id="label-火曜">【火曜日】</span>
            <label class="class-option">
                <input type="radio" name="location" value="火曜：積志【流拳會】（17:00-19:00）" required>
                <div class="class-card">
                    <div class="class-header"><span class="class-name">積志協働センター</span><span class="style-badge badge-ryuken">流拳會</span></div>
                    <div class="class-time">17:00〜19:00</div>
                </div>
            </label>
            <label class="class-option">
                <input type="radio" name="location" value="火曜：曳馬【禅道会】（17:30-18:30）">
                <div class="class-card">
                    <div class="class-header"><span class="class-name">曳馬協働センター</span><span class="style-badge badge-zendo">禅道会</span></div>
                    <div class="class-time">17:30〜18:30</div>
                </div>
            </label>
            <label class="class-option">
                <input type="radio" name="location" value="火曜：県居【武心館】（17:30-18:30）">
                <div class="class-card">
                    <div class="class-header"><span class="class-name">県居協働センター</span><span class="style-badge badge-bushin">武心館</span></div>
                    <div class="class-time">17:30〜18:30</div>
                </div>
            </label>

            <span class="day-label" id="label-水曜">【水曜日】</span>
            <label class="class-option">
                <input type="radio" name="location" value="水曜：西部【流拳會】（17:30-18:30）">
                <div class="class-card">
                    <div class="class-header"><span class="class-name">西部協働センター</span><span class="style-badge badge-ryuken">流拳會</span></div>
                    <div class="class-time">17:30〜18:30</div>
                </div>
            </label>
            <label class="class-option">
                <input type="radio" name="location" value="水曜：積志【武心館】（17:30-18:30）">
                <div class="class-card">
                    <div class="class-header"><span class="class-name">積志協働センター</span><span class="style-badge badge-bushin">武心館</span></div>
                    <div class="class-time">17:30〜18:30</div>
                </div>
            </label>
            <label class="class-option">
                <input type="radio" name="location" value="水曜：北部【禅道会】（17:30-18:30）">
                <div class="class-card">
                    <div class="class-header"><span class="class-name">北部協働センター</span><span class="style-badge badge-zendo">禅道会</span></div>
                    <div class="class-time">17:30〜18:30</div>
                </div>
            </label>

            <span class="day-label" id="label-木曜">【木曜日】</span>
            <label class="class-option">
                <input type="radio" name="location" value="木曜：白脇【流拳會】（17:30-18:30）">
                <div class="class-card">
                    <div class="class-header"><span class="class-name">白脇協働センター</span><span class="style-badge badge-ryuken">流拳會</span></div>
                    <div class="class-time">17:30〜18:30</div>
                </div>
            </label>
            <label class="class-option">
                <input type="radio" name="location" value="木曜：長鶴町【武心館】（18:00-19:00）">
                <div class="class-card">
                    <div class="class-header"><span class="class-name">長鶴町道場</span><span class="style-badge badge-bushin">武心館</span></div>
                    <div class="class-time">18:00〜19:00</div>
                </div>
            </label>
            <label class="class-option">
                <input type="radio" name="location" value="木曜：大平台【禅道会】（18:30-19:30）">
                <div class="class-card">
                    <div class="class-header"><span class="class-name">大平台小学校体育館</span><span class="style-badge badge-zendo">禅道会</span></div>
                    <div class="class-time">18:30〜19:30</div>
                </div>
            </label>

            <span class="day-label" id="label-金曜">【金曜日】</span>
            <label class="class-option">
                <input type="radio" name="location" value="金曜：高台【流拳會】（17:30-18:30）">
                <div class="class-card">
                    <div class="class-header"><span class="class-name">高台協働センター</span><span class="style-badge badge-ryuken">流拳會</span></div>
                    <div class="class-time">17:30〜18:30</div>
                </div>
            </label>
            <label class="class-option">
                <input type="radio" name="location" value="金曜：可美【禅道会】（17:30-18:30）">
                <div class="class-card">
                    <div class="class-header"><span class="class-name">可美総合センター</span><span class="style-badge badge-zendo">禅道会</span></div>
                    <div class="class-time">17:30〜18:30</div>
                </div>
            </label>

            <span class="day-label" id="label-土曜">【土曜日】</span>
            <label class="class-option">
                <input type="radio" name="location" value="土曜：長鶴町【武心館】（10:00-11:00）">
                <div class="class-card">
                    <div class="class-header"><span class="class-name">長鶴町道場</span><span class="style-badge badge-bushin">武心館</span></div>
                    <div class="class-time">10:00〜11:00</div>
                </div>
            </label>
            <label class="class-option">
                <input type="radio" name="location" value="土曜：冨塚【流拳會】（13:00-16:00）">
                <div class="class-card">
                    <div class="class-header"><span class="class-name">冨塚協働センター</span><span class="style-badge badge-ryuken">流拳會</span></div>
                    <div class="class-time">13:00〜16:00</div>
                </div>
            </label>
            <label class="class-option">
                <input type="radio" name="location" value="土曜：庄内【禅道会】（16:30-17:30）">
                <div class="class-card">
                    <div class="class-header"><span class="class-name">庄内協働センター</span><span class="style-badge badge-zendo">禅道会</span></div>
                    <div class="class-time">16:30〜17:30</div>
                </div>
            </label>
        </div>

        <div class="note">
            ※公共施設の都合等により開催時間が変更となる場合がございます。<br>
            ※お申し込み内容を確認後、担当者より詳細をご案内いたします。
        </div>

        <button type="button" class="submit-btn" onclick="sendReservation()">予約内容を確認して送信</button>
    </form>
</div>

<div id="customModal"><div class="modal-content"><p id="modalMsg" style="font-weight: bold; white-space: pre-wrap;"></p><button type="button" class="modal-btn" id="modalOkBtn">OK</button></div></div>

<script>
    liff.init({ liffId: "2009941460-m7lLdumu" }).then(() => { if (!liff.isLoggedIn()) liff.login(); });

    // --- 日付ドラムロール（セレクトボックス）の生成 ---
    const dateSelect = document.getElementById('visitDate');
    const dayNames = ['日', '月', '火', '水', '木', '金', '土'];
    const today = new Date();

    for (let i = 0; i < 14; i++) {
        const date = new Date();
        date.setDate(today.getDate() + i);
        const y = date.getFullYear();
        const m = date.getMonth() + 1;
        const d = date.getDate();
        const dayIdx = date.getDay();
        const dayStr = dayNames[dayIdx];

        // 稽古がない日（日・月）は除外
        if (dayIdx === 0 || dayIdx === 1) continue;

        const opt = document.createElement('option');
        opt.value = `${y}-${m}-${d}`;
        opt.text = `${m}月${d}日 (${dayStr})`;
        opt.dataset.day = dayIdx; // 曜日番号を保存
        dateSelect.appendChild(opt);
    }

    // 日付と教室の有効・無効を同期
    function syncDayAndClasses() {
        const selectedOption = dateSelect.options[dateSelect.selectedIndex];
        const dayNum = selectedOption.dataset.day; 
        const dayMap = { 2: "火曜", 3: "水曜", 4: "木曜", 5: "金曜", 6: "土曜" };
        const selectedDayName = dayMap[dayNum];

        const radios = document.getElementsByName('location');
        const dayLabels = document.querySelectorAll('.day-label');

        radios.forEach(radio => {
            if (selectedDayName && radio.value.includes(selectedDayName)) {
                radio.disabled = false;
            } else {
                radio.disabled = true;
                radio.checked = false; 
            }
        });

        dayLabels.forEach(label => {
            if (selectedDayName && label.innerText.includes(selectedDayName)) {
                label.classList.remove('is-disabled');
            } else {
                label.classList.add('is-disabled');
            }
        });
    }

    function showModal(msg, closeLiff) {
        const modal = document.getElementById('customModal');
        document.getElementById('modalMsg').innerText = msg;
        modal.style.display = 'flex';
        document.getElementById('modalOkBtn').onclick = () => {
            modal.style.display = 'none';
            if (closeLiff) liff.closeWindow();
        };
    }

    function sendReservation() {
        const name = document.getElementById('childName').value;
        const age = document.getElementById('childAge').value;
        const dateVal = document.getElementById('visitDate').value;
        const telVal = document.getElementById('tel').value;
        const locEl = document.querySelector('input[name="location"]:checked');
        const location = locEl ? locEl.value : '';

        if (!name || !age || !dateVal || !location || !telVal) {
            showModal('すべての項目を入力・選択してください。', false);
            return;
        }

        const details = `【体験＆見学予約】\n①お子さんの氏名：${name}\n②お子さんの年齢：${age}歳\n③希望日：${dateVal}\n④希望場所：${location}\n⑤ご連絡先：${telVal}`;
        const keyword = `【体験＆見学のご予約】`;

        liff.sendMessages([
            { type: 'text', text: details },
            { type: 'text', text: keyword }
        ]).then(() => {
            showModal('予約情報を送信しました。', true);
        }).catch(() => {
            showModal('送信に失敗しました。LINEアプリ内でお試しください。', false);
        });
    }
</script>

</body>
</html>
