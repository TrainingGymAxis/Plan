<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>体験＆見学予約 | 浜松スポーツ少年団</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root {
            --primary-orange: #f57c00; 
            --header-yellow: #ffb300; 
            --accent-green: #4caf50;  
            --bg-color: #fafafa;     
            --text-black: #000000;    
            --box-border: #ffd54f;   
            --ryuken-color: #e53935; /* 流拳會 */
            --zendo-color: #1e88e5;  /* 禅道会 */
            --bushin-color: #43a047; /* 武心館 */
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--text-black);
            line-height: 1.6;
        }

        .site-header {
            background-color: var(--header-yellow);
            padding: 15px;
            text-align: center;
            border-bottom: 4px solid var(--primary-orange);
        }

        .container {
            max-width: 500px;
            margin: 15px auto;
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            border: 2px solid var(--box-border);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 50px;
        }

        h2 {
            text-align: center;
            color: var(--primary-orange);
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }

        h2::after {
            content: '';
            display: block;
            width: 40px;
            height: 4px;
            background: var(--accent-green);
            margin: 8px auto 0;
            border-radius: 2px;
        }

        .description {
            font-size: 0.9rem;
            margin-bottom: 20px;
            color: var(--text-black);
            text-align: center;
            font-weight: bold;
        }

        .form-group { margin-bottom: 18px; }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 0.95rem;
            color: var(--text-black);
        }

        input[type="text"], input[type="number"], input[type="date"], input[type="tel"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            color: var(--text-black);
        }

        /* 曜日の大きなラベル */
        .day-label {
            display: block;
            font-size: 1.15rem;
            color: var(--primary-orange);
            margin-bottom: 10px;
            font-weight: bold;
            border-top: 1px solid #eee;
            padding-top: 15px;
            margin-top: 20px;
        }

        .class-option {
            position: relative;
            margin-bottom: 10px;
            display: block;
        }
        .class-option input[type="radio"] { display: none; }
        
        .class-card {
            display: block;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 10px;
            cursor: pointer;
            background-color: #fff;
        }
        .class-option input[type="radio"]:checked + .class-card {
            border-color: var(--primary-orange);
            background-color: #fff8f1;
        }

        .class-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .class-name { font-weight: bold; font-size: 0.95rem; }
        
        .style-badge {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 4px;
            color: #fff;
            font-weight: bold;
        }
        .badge-ryuken { background-color: var(--ryuken-color); }
        .badge-zendo { background-color: var(--zendo-color); }
        .badge-bushin { background-color: var(--bushin-color); }

        .class-time { font-size: 0.85rem; color: #555; }

        .note {
            font-size: 0.8rem;
            background: #fffdf0;
            padding: 12px;
            border: 1px dashed var(--primary-orange);
            margin-top: 20px;
            border-radius: 8px;
            color: var(--text-black);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background-color: var(--primary-orange);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 0 #bf6500;
        }
        .submit-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #bf6500; }

        /* カスタムモーダル */
        #customModal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            width: 80%;
            max-width: 300px;
            text-align: center;
        }
        .modal-message { font-weight: bold; margin-bottom: 20px; color: var(--text-black); }
        .modal-btn {
            background: var(--primary-orange);
            color: #fff;
            border: none;
            padding: 10px 40px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="site-header">
    <span style="color: #000; font-weight: bold;">浜松スポーツ少年団 こども空手教室</span>
</div>

<div class="container">
    <h2>体験＆見学のご予約</h2>
    <p class="description">必要事項をご入力ください</p>

    <form id="reservationForm">
        <div class="form-group">
            <label for="childName">お子さんの氏名</label>
            <input type="text" id="childName" required>
        </div>

        <div class="form-group">
            <label for="childAge">お子さんの年齢</label>
            <input type="number" id="childAge" min="3" max="15" required>
        </div>

        <div class="form-group">
            <label for="visitDate">体験＆見学のご希望日</label>
            <input type="date" id="visitDate" required>
        </div>

        <div class="form-group">
            <label for="tel">ご連絡先 (電話番号)</label>
            <input type="tel" id="tel" required>
        </div>

        <div class="form-group">
            <label>体験希望の教室・時間を選んでください</label>

            <span class="day-label">【火曜日】</span>
            <label class="class-option">
                <input type="radio" name="location" value="火曜：積志協働センター【流拳會】（17:00-19:00）" required>
                <div class="class-card">
                    <div class="class-header"><span class="class-name">積志協働センター</span><span class="style-badge badge-ryuken">流拳會</span></div>
                    <div class="class-time">17:00〜19:00</div>
                </div>
            </label>
            <label class="class-option">
                <input type="radio" name="location" value="火曜：曳馬協働センター【禅道会】（17:30-18:30）">
                <div class="class-card">
                    <div class="class-header"><span class="class-name">曳馬協働センター</span><span class="style-badge badge-zendo">禅道会</span></div>
                    <div class="class-time">17:30〜18:30</div>
                </div>
            </label>
            <label class="class-option">
                <input type="radio" name="location" value="火曜：県居協働センター【武心館】（17:30-18:30）">
                <div class="class-card">
                    <div class="class-header"><span class="class-name">県居協働センター</span><span class="style-badge badge-bushin">武心館</span></div>
                    <div class="class-time">17:30〜18:30</div>
                </div>
            </label>

            <span class="day-label">【水曜日】</span>
            <label class="class-option">
                <input type="radio" name="location" value="水曜：西部協働センター【流拳會】（17:30-18:30）">
                <div class="class-card">
                    <div class="class-header"><span class="class-name">西部協働センター</span><span class="style-badge badge-ryuken">流拳會</span></div>
                    <div class="class-time">17:30〜18:30</div>
                </div>
            </label>
            <label class="class-option">
                <input type="radio" name="location" value="水曜：積志協働センター【武心館】（17:30-18:30）">
                <div class="class-card">
                    <div class="class-header"><span class="class-name">積志協働センター</span><span class="style-badge badge-bushin">武心館</span></div>
                    <div class="class-time">17:30〜18:30</div>
                </div>
            </label>
            <label class="class-option">
                <input type="radio" name="location" value="水曜：北部協働センター【禅道会】（17:30-18:30）">
                <div class="class-card">
                    <div class="class-header"><span class="class-name">北部協働センター</span><span class="style-badge badge-zendo">禅道会</span></div>
                    <div class="class-time">17:30〜18:30</div>
                </div>
            </label>

            <span class="day-label">【木曜日】</span>
            <label class="class-option">
                <input type="radio" name="location" value="木曜：白脇協働センター【流拳會】（17:30-18:30）">
                <div class="class-card">
                    <div class="class-header"><span class="class-name">白脇協働センター</span><span class="style-badge badge-ryuken">流拳會</span></div>
                    <div class="class-time">17:30〜18:30</div>
                </div>
            </label>
            <label class="class-option">
                <input type="radio" name="location" value="木曜：長鶴町道場【武心館】（18:00-19:00）">
                <div class="class-card">
                    <div class="class-header"><span class="class-name">長鶴町道場</span><span class="style-badge badge-bushin">武心館</span></div>
                    <div class="class-time">18:00〜19:00</div>
                </div>
            </label>
            <label class="class-option">
                <input type="radio" name="location" value="木曜：大平台小学校体育館【禅道会】（18:30-19:30）">
                <div class="class-card">
                    <div class="class-header"><span class="class-name">大平台小学校体育館</span><span class="style-badge badge-zendo">禅道会</span></div>
                    <div class="class-time">18:30〜19:30</div>
                </div>
            </label>

            <span class="day-label">【金曜日】</span>
            <label class="class-option">
                <input type="radio" name="location" value="金曜：高台協働センター【流拳會】（17:30-18:30）">
                <div class="class-card">
                    <div class="class-header"><span class="class-name">高台協働センター</span><span class="style-badge badge-ryuken">流拳會</span></div>
                    <div class="class-time">17:30〜18:30</div>
                </div>
            </label>
            <label class="class-option">
                <input type="radio" name="location" value="金曜：可美総合センター【禅道会】（17:30-18:30）">
                <div class="class-card">
                    <div class="class-header"><span class="class-name">可美総合センター</span><span class="style-badge badge-zendo">禅道会</span></div>
                    <div class="class-time">17:30〜18:30</div>
                </div>
            </label>

            <span class="day-label">【土曜日】</span>
            <label class="class-option">
                <input type="radio" name="location" value="土曜：長鶴町道場【武心館】（10:00-11:00）">
                <div class="class-card">
                    <div class="class-header"><span class="class-name">長鶴町道場</span><span class="style-badge badge-bushin">武心館</span></div>
                    <div class="class-time">10:00〜11:00</div>
                </div>
            </label>
            <label class="class-option">
                <input type="radio" name="location" value="土曜：冨塚協働センター【流拳會】（13:00-16:00）">
                <div class="class-card">
                    <div class="class-header"><span class="class-name">冨塚協働センター</span><span class="style-badge badge-ryuken">流拳會</span></div>
                    <div class="class-time">13:00〜16:00</div>
                </div>
            </label>
            <label class="class-option">
                <input type="radio" name="location" value="土曜：庄内協働センター【禅道会】（16:30-17:30）">
                <div class="class-card">
                    <div class="class-header"><span class="class-name">庄内協働センター</span><span class="style-badge badge-zendo">禅道会</span></div>
                    <div class="class-time">16:30〜17:30</div>
                </div>
            </label>

        </div>

        <div class="note">
            ※公共施設の都合等により開催時間が変更となる場合がございます。<br>
            ※お申し込み内容を確認後、担当者より詳細をご案内いたします。
        </div>

        <button type="button" class="submit-btn" onclick="sendReservation()">予約内容を確認して送信</button>
    </form>
</div>

<div id="customModal">
    <div class="modal-content">
        <p id="modalMsg" class="modal-message"></p>
        <button type="button" class="modal-btn" id="modalOkBtn">OK</button>
    </div>
</div>

<script>
    liff.init({ liffId: "2009941460-m7lLdumu" }).then(() => {
        if (!liff.isLoggedIn()) { liff.login(); }
    });

    function showModal(msg, closeLiff) {
        const modal = document.getElementById('customModal');
        const modalBtn = document.getElementById('modalOkBtn');
        document.getElementById('modalMsg').innerText = msg;
        modal.style.display = 'flex';
        
        modalBtn.onclick = function() {
            modal.style.display = 'none';
            if (closeLiff) { liff.closeWindow(); }
        };
    }

    function sendReservation() {
        const name = document.getElementById('childName').value;
        const age = document.getElementById('childAge').value;
        const date = document.getElementById('visitDate').value;
        const tel = document.getElementById('tel').value;
        const locEl = document.querySelector('input[name="location"]:checked');
        const location = locEl ? locEl.value : '';

        if (!name || !age || !date || !location || !tel) {
            showModal('すべての項目を入力・選択してください。', false);
            return;
        }

        const details = `①お子さんの氏名：${name}\n②お子さんの年齢：${age}歳\n③希望日：${date}\n④希望場所・時間：${location}\n⑤ご連絡先：${tel}`;
        const keyword = `【体験＆見学のご予約】`;

        liff.sendMessages([
            { type: 'text', text: details },
            { type: 'text', text: keyword }
        ]).then(() => {
            showModal('予約情報を送信しました。', true);
        }).catch(() => {
            showModal('送信に失敗しました。LINEアプリ内でお試しください。', false);
        });
    }
</script>

</body>
</html>
