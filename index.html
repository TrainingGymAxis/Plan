<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浜松スポーツ少年団こども空手教室</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root {
            --primary-orange: #f57c00; 
            --header-yellow: #ffb300; 
            --accent-green: #4caf50;  
            --bg-color: #fafafa;     
            --text-black: #000000;    
            --box-border: #ffd54f;   
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--text-black);
            line-height: 1.6;
        }

        .site-header {
            background-color: var(--header-yellow);
            padding: 15px;
            text-align: center;
            border-bottom: 4px solid var(--primary-orange);
        }

        .container {
            max-width: 500px;
            margin: 20px auto;
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            border: 2px solid var(--box-border);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        h2 {
            text-align: center;
            color: var(--primary-orange);
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.4rem;
        }

        h2::after {
            content: '';
            display: block;
            width: 40px;
            height: 4px;
            background: var(--accent-green);
            margin: 8px auto 0;
            border-radius: 2px;
        }

        .description {
            font-size: 0.95rem;
            margin-bottom: 25px;
            color: var(--text-black);
            text-align: center;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 0.95rem;
            color: var(--text-black);
        }

        input, select {
            width: 100%;
            padding: 14px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            background-color: #fff;
            color: var(--text-black);
        }

        select {
            background-image: linear-gradient(45deg, transparent 50%, #000 50%), linear-gradient(135deg, #000 50%, transparent 50%);
            background-position: calc(100% - 20px) calc(1em + 5px), calc(100% - 15px) calc(1em + 5px);
            background-size: 5px 5px, 5px 5px;
            background-repeat: no-repeat;
            -webkit-appearance: none;
        }

        .note {
            font-size: 0.85rem;
            background: #fffdf0;
            padding: 15px;
            border: 1px dashed var(--primary-orange);
            margin-top: 25px;
            border-radius: 8px;
            color: var(--text-black);
        }

        button {
            width: 100%;
            padding: 18px;
            background-color: var(--primary-orange);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 4px 0 #bf6500;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #bf6500;
        }
    </style>
</head>
<body>

<div class="site-header">
    <span style="color: #000; font-weight: bold;">浜松スポーツ少年団 こども空手教室</span>
</div>

<div class="container">
    <h2>体験＆見学のご予約</h2>
    <p class="description">空手教室の雰囲気を感じてみませんか？</p>

    <form id="reservationForm">
        <div class="form-group">
            <label for="childName">お子さんの氏名</label>
            <input type="text" id="childName" required>
        </div>

        <div class="form-group">
            <label for="childAge">お子さんの年齢</label>
            <input type="number" id="childAge" min="3" max="15" required>
        </div>

        <div class="form-group">
            <label for="visitDate">体験＆見学のご希望日</label>
            <input type="date" id="visitDate" required>
        </div>

        <div class="form-group">
            <label for="location">体験希望の教室【流派】・時間</label>
            <select id="location" required>
                <option value="">教室を選択してください</option>
                <optgroup label="【火曜日】">
                    <option value="火曜：積志協働センター【流拳會】（17:00-19:00）">積志協働センター【流拳會】 17:00〜19:00</option>
                    <option value="火曜：曳馬協働センター【禅道会】（17:30-18:30）">曳馬協働センター【禅道会】 17:30〜18:30</option>
                    <option value="火曜：県居協働センター【武心館】（17:30-18:30）">県居協働センター【武心館】 17:30〜18:30</option>
                </optgroup>
                <optgroup label="【水曜日】">
                    <option value="水曜：西部協働センター【流拳會】（17:30-18:30）">西部協働センター【流拳會】 17:30〜18:30</option>
                    <option value="水曜：積志協働センター【武心館】（17:30-18:30）">積志協働センター【武心館】 17:30〜18:30</option>
                    <option value="水曜：北部協働センター【禅道会】（17:30-18:30）">北部協働センター【禅道会】 17:30〜18:30</option>
                </optgroup>
                <optgroup label="【木曜日】">
                    <option value="木曜：白脇協働センター【流拳會】（17:30-18:30）">白脇協働センター【流拳會】 17:30〜18:30</option>
                    <option value="木曜：大平台小学校体育館【禅道会】（18:30-19:30）">大平台小学校体育館【禅道会】 18:30〜19:30</option>
                    <option value="木曜：長鶴町道場【武心館】（18:00-19:00）">長鶴町道場【武心館】 18:00〜19:00</option>
                </optgroup>
                <optgroup label="【金曜日】">
                    <option value="金曜：高台協働センター【流拳會】（17:30-18:30）">高台協働センター【流拳會】 17:30〜18:30</option>
                    <option value="金曜：可美総合センター【禅道会】（17:30-18:30）">可美総合センター【禅道会】 17:30〜18:30</option>
                </optgroup>
                <optgroup label="【土曜日】">
                    <option value="土曜：長鶴町道場【武心館】（10:00-11:00）">長鶴町道場【武心館】 10:00〜11:00</option>
                    <option value="土曜：冨塚協働センター【流拳會】（13:00-16:00）">冨塚協働センター【流拳會】 13:00〜16:00</option>
                    <option value="土曜：庄内協働センター【禅道会】（16:30-17:30）">庄内協働センター【禅道会】 16:30〜17:30</option>
                </optgroup>
            </select>
        </div>

        <div class="form-group">
            <label for="tel">ご連絡先 (電話番号)</label>
            <input type="tel" id="tel" required>
        </div>

        <div class="note">
            ※公共施設の都合により、開催時間が変更となる場合がございます。<br>
            ※お申し込み内容を確認後、担当者より持ち物等について詳細をご案内いたします。
        </div>

        <button type="button" onclick="sendReservation()">予約内容を確認して送信</button>
    </form>
</div>

<script>
    liff.init({
        liffId: "YOUR_LIFF_ID" 
    }).then(() => {
        if (!liff.isLoggedIn()) {
            liff.login();
        }
    });

    function sendReservation() {
        const name = document.getElementById('childName').value;
        const age = document.getElementById('childAge').value;
        const date = document.getElementById('visitDate').value;
        const location = document.getElementById('location').value;
        const tel = document.getElementById('tel').value;

        if (!name || !age || !date || !location || !tel) {
            alert('すべての項目を入力してください。');
            return;
        }

        // 送信順序を逆に設定

        // 1. 詳細データ（こちらを先に送る）
        const details = `①お子さんの氏名：${name}\n` +
                        `②お子さんの年齢：${age}歳\n` +
                        `③希望日：${date}\n` +
                        `④希望場所・時間：${location}\n` +
                        `⑤ご連絡先：${tel}`;

        // 2. 自動応答を起動させるキーワード（こちらを後に送る）
        const keyword = `【体験＆見学のご予約】`;

        liff.sendMessages([
            {
                type: 'text',
                text: details
            },
            {
                type: 'text',
                text: keyword
            }
        ]).then(() => {
            alert('予約情報を送信しました。');
            liff.closeWindow();
        }).catch((err) => {
            alert('送信に失敗しました。');
        });
    }
</script>

</body>
</html>
